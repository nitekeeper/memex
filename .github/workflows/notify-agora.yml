name: Notify agora of release

# Fires when a GitHub Release is published in this repo. Sends a
# repository_dispatch event to nitekeeper/agora so the marketplace can
# auto-bump the pinned memex version.
#
# Requires the AGORA_DISPATCH_TOKEN secret — a fine-grained PAT scoped
# to nitekeeper/agora with Contents+Metadata read-only. See agora's
# docs/automation.md for the setup walkthrough.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify:
    name: Fire repository_dispatch at agora
    runs-on: ubuntu-latest
    steps:
      - name: Send dispatch
        env:
          GH_TOKEN: ${{ secrets.AGORA_DISPATCH_TOKEN }}
        run: |
          plugin=$(echo "${{ github.event.repository.name }}" | tr 'A-Z' 'a-z')
          tag="${{ github.event.release.tag_name }}"
          echo "Dispatching plugin-released to nitekeeper/agora (plugin=$plugin, tag=$tag)"
          gh api repos/nitekeeper/agora/dispatches \
            -f event_type=plugin-released \
            -f client_payload[plugin]="$plugin" \
            -f client_payload[tag]="$tag"
